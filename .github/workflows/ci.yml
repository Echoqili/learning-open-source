name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    name: Ruff (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ruff pyyaml
      - name: Ruff check
        run: ruff check scripts/ web/ || true
      - name: Ruff format check
        run: ruff format --check scripts/ web/ || true

  build-index:
    name: Build Skills Index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pyyaml
      - name: Build index
        run: python scripts/build_skills_index.py
      - name: Check for changes
        run: git diff --stat

  web-server:
    name: Web Server Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install flask watchdog python-dotenv requests pyyaml
      - name: Test imports
        run: python -c "from web.app import app; print('Flask app loaded successfully')"
