<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Skills Manager - 智能 Skills 导航</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ========== 核心变量 & 主题 ========== */
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --accent: #f472b6;
            --accent-secondary: #38bdf8;
            --bg-main: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.8);
            --bg-glass: rgba(255, 255, 255, 0.05);
            --bg-glass-hover: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.1);
            --border-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            --gradient-accent: linear-gradient(135deg, #f472b6 0%, #818cf8 100%);
            --gradient-bg: linear-gradient(180deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--gradient-bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========== 动态背景 ========== */
        .bg-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .bg-orb:nth-child(1) {
            width: 600px;
            height: 600px;
            background: var(--primary);
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .bg-orb:nth-child(2) {
            width: 500px;
            height: 500px;
            background: var(--accent);
            top: 50%;
            right: -150px;
            animation-delay: -7s;
        }

        .bg-orb:nth-child(3) {
            width: 400px;
            height: 400px;
            background: var(--accent-secondary);
            bottom: -100px;
            left: 30%;
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* ========== 容器布局 ========== */
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* ========== 头部 Hero 区域 ========== */
        .hero {
            text-align: center;
            padding: 60px 0 40px;
            margin-bottom: 40px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            animation: fadeInDown 0.6s ease-out;
        }

        .hero-badge span {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== 搜索区域 ========== */
        .search-section {
            max-width: 800px;
            margin: 0 auto 50px;
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            gap: 12px;
        }

        .search-box {
            position: relative;
            flex: 1;
        }

        .search-box::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            padding: 2px;
            background: var(--gradient-primary);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .search-box:focus-within::before {
            opacity: 1;
        }

        .search-box input {
            width: 100%;
            padding: 20px 24px 20px 56px;
            font-size: 1.1rem;
            background: var(--bg-card);
            border: none;
            border-radius: var(--radius-lg);
            color: var(--text);
            outline: none;
            backdrop-filter: blur(20px);
            transition: all 0.3s;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .search-box:focus-within .search-icon {
            color: var(--primary);
        }

        .search-btn {
            padding: 0 32px;
            background: var(--gradient-primary);
            border: none;
            border-radius: var(--radius-lg);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .search-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
        }

        .search-btn:hover::before {
            opacity: 1;
        }

        .search-btn:active {
            transform: translateY(0);
        }

        .search-btn.secondary {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            padding: 0 24px;
        }

        .search-btn.secondary:hover {
            background: var(--bg-glass-hover);
            box-shadow: none;
        }

        /* ========== 标签页 ========== */
        .nav-tabs {
            display: flex;
            gap: 8px;
            padding: 8px;
            background: var(--bg-glass);
            border-radius: var(--radius-xl);
            margin-bottom: 32px;
            overflow-x: auto;
            backdrop-filter: blur(20px);
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }

        .nav-tabs::-webkit-scrollbar {
            height: 0;
        }

        .nav-tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-tab:hover {
            background: var(--bg-glass-hover);
            color: var(--text);
        }

        .nav-tab.active {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        .nav-tab .count {
            padding: 2px 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 100px;
            font-size: 0.75rem;
        }

        .nav-tab.active .count {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ========== 内容区域 ========== */
        .content-section {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .section-title .tag {
            padding: 4px 12px;
            background: var(--bg-glass);
            border-radius: 100px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .section-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* ========== 技能卡片网格 ========== */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .skill-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .skill-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .skill-card:hover {
            transform: translateY(-8px);
            border-color: var(--border-glow);
            box-shadow: var(--shadow-card), var(--shadow-glow);
        }

        .skill-card:hover::before {
            opacity: 1;
        }

        .skill-card-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
        }

        .skill-emoji {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-glass);
            border-radius: var(--radius-md);
            font-size: 1.8rem;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .skill-card:hover .skill-emoji {
            transform: scale(1.1) rotate(-5deg);
            background: var(--bg-glass-hover);
        }

        .skill-info {
            flex: 1;
            min-width: 0;
        }

        .skill-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .skill-name .new-badge {
            padding: 2px 8px;
            background: var(--accent);
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .skill-category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--bg-glass);
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .skill-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .skill-tag {
            padding: 4px 10px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 100px;
            font-size: 0.75rem;
            color: var(--primary-light);
        }

        .skill-actions {
            display: flex;
            gap: 8px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .skill-action {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .skill-action.primary {
            background: var(--gradient-primary);
            color: white;
        }

        .skill-action.primary:hover {
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        .skill-action.secondary {
            background: var(--bg-glass);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .skill-action.secondary:hover {
            background: var(--bg-glass-hover);
            color: var(--text);
        }

        /* ========== GitHub 卡片 ========== */
        .github-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        .github-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .github-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-glow);
            box-shadow: var(--shadow-card);
        }

        .github-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .github-owner {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .github-stars {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(245, 158, 11, 0.1);
            border-radius: 100px;
            font-size: 0.85rem;
            color: #fbbf24;
        }

        .github-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary-light);
            text-decoration: none;
            display: block;
            margin-bottom: 8px;
            transition: color 0.3s;
        }

        .github-name:hover {
            color: var(--accent);
        }

        .github-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .github-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .github-lang {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lang-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* ========== 场景卡片 ========== */
        .scenarios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .scenario-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .scenario-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .scenario-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--border-glow);
            box-shadow: var(--shadow-card);
        }

        .scenario-card:hover::after {
            opacity: 0.05;
        }

        .scenario-emoji {
            font-size: 3rem;
            margin-bottom: 16px;
            display: block;
            position: relative;
            z-index: 1;
            transition: transform 0.3s;
        }

        .scenario-card:hover .scenario-emoji {
            transform: scale(1.2);
        }

        .scenario-card h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .scenario-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }

        .scenario-count {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            background: var(--bg-glass);
            border-radius: 100px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            z-index: 1;
        }

        /* ========== 分类卡片 ========== */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .category-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .category-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-glow);
            box-shadow: var(--shadow-card);
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .category-emoji {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-glass);
            border-radius: var(--radius-md);
            font-size: 1.5rem;
        }

        .category-info h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .category-count {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .category-bar {
            height: 4px;
            background: var(--bg-glass);
            border-radius: 2px;
            overflow: hidden;
        }

        .category-bar-fill {
            height: 100%;
            background: var(--gradient-primary);
            border-radius: 2px;
            transition: width 1s ease-out;
        }

        /* ========== 打包清单 ========== */
        .cart-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .cart-empty {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .cart-empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .cart-empty h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        /* ========== AI 推荐卡片 ========== */
        .ai-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(168, 85, 247, 0.15));
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(20px);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .ai-avatar {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-primary);
            border-radius: 50%;
            font-size: 1.5rem;
        }

        .ai-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .ai-text {
            color: var(--text);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 16px;
        }

        .ai-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .ai-suggestion {
            padding: 6px 14px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 100px;
            font-size: 0.85rem;
            color: var(--primary-light);
            cursor: pointer;
            transition: all 0.3s;
        }

        .ai-suggestion:hover {
            background: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }

        /* ========== 详情页 ========== */
        .detail-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 40px;
            backdrop-filter: blur(20px);
        }

        .detail-header {
            display: flex;
            align-items: flex-start;
            gap: 24px;
            margin-bottom: 32px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--border);
        }

        .detail-emoji {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-glass);
            border-radius: var(--radius-lg);
            font-size: 3rem;
        }

        .detail-info h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .detail-meta {
            display: flex;
            gap: 16px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .detail-desc {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .detail-files {
            background: var(--bg-glass);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 32px;
        }

        .detail-files h4 {
            font-size: 1rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-list {
            list-style: none;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .file-item:hover {
            background: var(--bg-glass-hover);
        }

        .file-name {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
        }

        .file-size {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .detail-actions {
            display: flex;
            gap: 12px;
        }

        /* ========== 骨架屏 ========== */
        .skeleton {
            background: linear-gradient(
                90deg,
                var(--bg-glass) 25%,
                var(--bg-glass-hover) 50%,
                var(--bg-glass) 75%
            );
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-sm);
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
        }

        .skeleton-header {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .skeleton-emoji {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
        }

        .skeleton-info {
            flex: 1;
        }

        .skeleton-title {
            height: 20px;
            width: 60%;
            margin-bottom: 8px;
        }

        .skeleton-subtitle {
            height: 14px;
            width: 40%;
        }

        .skeleton-text {
            height: 14px;
            margin-bottom: 8px;
        }

        .skeleton-text:last-child {
            width: 80%;
        }

        /* ========== Toast 通知 ========== */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            padding: 16px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: toastIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toast.removing {
            animation: toastOut 0.3s ease-in forwards;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }

        .toast-icon {
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        .toast-message {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            transition: color 0.3s;
        }

        .toast-close:hover {
            color: var(--text);
        }

        .toast.success { border-left: 3px solid var(--success); }
        .toast.success .toast-icon { color: var(--success); }

        .toast.error { border-left: 3px solid var(--error); }
        .toast.error .toast-icon { color: var(--error); }

        .toast.warning { border-left: 3px solid var(--warning); }
        .toast.warning .toast-icon { color: var(--warning); }

        .toast.info { border-left: 3px solid var(--primary); }
        .toast.info .toast-icon { color: var(--primary); }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            animation: fadeIn 0.5s ease-out;
        }

        .empty-icon {
            font-size: 5rem;
            margin-bottom: 24px;
            opacity: 0.6;
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-desc {
            color: var(--text-muted);
            max-width: 400px;
            margin: 0 auto 24px;
        }

        /* ========== 加载动画 ========== */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-glass);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: inherit;
            backdrop-filter: blur(4px);
        }

        /* ========== 滚动动画 ========== */
        .scroll-reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .scroll-reveal.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* ========== 滚动条 ========== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-glass-hover);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* ========== 页脚 ========== */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            margin-top: 60px;
        }

        footer a {
            color: var(--primary-light);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* ========== 按钮 ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-glass);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-glass-hover);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-ghost:hover {
            color: var(--text);
            background: var(--bg-glass);
        }

        /* ========== 返回按钮 ========== */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 24px;
        }

        .btn-back:hover {
            background: var(--bg-glass-hover);
            color: var(--text);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .app-container {
                padding: 24px 16px;
            }

            .hero h1 {
                font-size: 2.2rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .search-wrapper {
                flex-direction: column;
            }

            .search-btn {
                width: 100%;
                padding: 16px;
            }

            .nav-tabs {
                gap: 4px;
                padding: 6px;
            }

            .nav-tab {
                padding: 10px 16px;
                font-size: 0.85rem;
            }

            .skills-grid {
                grid-template-columns: 1fr;
            }

            .github-grid {
                grid-template-columns: 1fr;
            }

            .scenarios-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .categories-grid {
                grid-template-columns: 1fr;
            }

            .detail-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .detail-section {
                padding: 24px;
            }

            .toast-container {
                left: 16px;
                right: 16px;
            }

            .toast {
                min-width: auto;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <!-- 动态背景 -->
    <div class="bg-orbs">
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
    </div>

    <div class="app-container">
        <!-- Hero 区域 -->
        <header class="hero">
            <div class="hero-badge">
                <span></span>
                149+ Skills 覆盖 14 个分类
            </div>
            <h1>🧠 Skills Manager</h1>
            <p>智能 Skills 搜索引擎，发现、浏览、打包您的技能工具箱</p>
        </header>

        <!-- 搜索区域 -->
        <section class="search-section">
            <div class="search-wrapper">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="🔍 输入关键词搜索（如：Sprint规划、用户故事、AI安全）..." onkeypress="if(event.key==='Enter') searchSkills()">
                </div>
                <button onclick="searchSkills()" class="search-btn">🔍 搜索</button>
                <button onclick="searchAll()" class="search-btn secondary">🌐 全网搜索</button>
            </div>
        </section>

        <!-- 导航标签 -->
        <nav class="nav-tabs">
            <button class="nav-tab active" data-tab="search">
                📋 本地 Skills
            </button>
            <button class="nav-tab" data-tab="github">
                🐙 GitHub 仓库
            </button>
            <button class="nav-tab" data-tab="scenarios">
                🎯 场景推荐
            </button>
            <button class="nav-tab" data-tab="categories">
                📂 分类浏览
            </button>
            <button class="nav-tab" data-tab="cart">
                📦 打包清单 <span class="count" id="cartCount">0</span>
            </button>
        </nav>

        <main>
            <!-- 搜索结果 -->
            <section id="searchSection" class="content-section active">
                <div class="section-header">
                    <div class="section-title">
                        <h2>📋 本地 Skills</h2>
                        <span class="tag" id="searchTag">输入关键词开始搜索</span>
                    </div>
                </div>
                <div id="aiRecommendation"></div>
                <div id="searchResults"></div>
            </section>

            <!-- GitHub 仓库 -->
            <section id="githubSection" class="content-section">
                <div class="section-header">
                    <div class="section-title">
                        <h2>🐙 GitHub 仓库</h2>
                        <span class="tag" id="githubTag">发现优质开源项目</span>
                    </div>
                </div>
                <div id="githubResults"></div>
            </section>

            <!-- 场景推荐 -->
            <section id="scenariosSection" class="content-section">
                <div class="section-header">
                    <div class="section-title">
                        <h2>🎯 场景化推荐</h2>
                        <span class="tag" id="scenarioTag">选择您的使用场景</span>
                    </div>
                </div>
                <div id="scenariosList"></div>
            </section>

            <!-- 分类浏览 -->
            <section id="categoriesSection" class="content-section">
                <div class="section-header">
                    <div class="section-title">
                        <h2>📂 分类浏览</h2>
                        <span class="tag">按分类查看所有 Skills</span>
                    </div>
                </div>
                <div id="categoriesList"></div>
            </section>

            <!-- 打包清单 -->
            <section id="cartSection" class="content-section">
                <div class="section-header">
                    <div class="section-title">
                        <h2>📦 打包清单</h2>
                        <span class="tag" id="cartTag">已选择 0 个 Skills</span>
                    </div>
                </div>
                <div class="cart-actions">
                    <button class="btn btn-primary" onclick="packageSelected()">
                        📦 打包下载选中项
                    </button>
                    <button class="btn btn-secondary" onclick="packageAll()">
                        📦 打包全部
                    </button>
                    <button class="btn btn-ghost" onclick="clearCart()">
                        清空清单
                    </button>
                </div>
                <div id="cartList"></div>
            </section>

            <!-- 详情页 -->
            <section id="detailSection" class="content-section">
                <button class="btn-back" onclick="showSection('search')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="m15 18-6-6 6-6"/>
                    </svg>
                    返回
                </button>
                <div id="skillDetail"></div>
            </section>
        </main>

        <footer>
            <p>Skills Manager | <span id="totalSkills">0</span> 个 Skills | 由 AI 驱动</p>
        </footer>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ========== 全局状态 ==========
        let cart = [];
        let allSkills = {};
        let currentView = 'search';
        let isLoading = false;

        // 语言颜色映射
        const langColors = {
            'Python': '#3572A5',
            'JavaScript': '#f1e05a',
            'TypeScript': '#3178c6',
            'HTML': '#e34c26',
            'CSS': '#563d7c',
            'Java': '#b07219',
            'Go': '#00ADD8',
            'Rust': '#dea584',
            'Ruby': '#701516',
            'PHP': '#4F5D95',
            'Shell': '#89e051',
            'Vue': '#41b883',
            'React': '#61dafb'
        };

        // ========== 初始化 ==========
        async function init() {
            await loadStats();
            loadCart();
            setupTabs();
            setupScrollReveal();
        }

        function setupTabs() {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    const section = tab.dataset.tab;
                    showSection(section);
                    if (section === 'scenarios') loadScenarios();
                    if (section === 'categories') loadCategories();
                    if (section === 'cart') renderCart();
                });
            });
        }

        function setupScrollReveal() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('revealed');
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

            document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
        }

        // ========== 统计加载 ==========
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('totalSkills').textContent = data.total;
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }

        // ========== 区域切换 ==========
        function showSection(section) {
            currentView = section;
            document.querySelectorAll('.nav-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === section);
            });
            document.querySelectorAll('.content-section').forEach(c => {
                c.classList.toggle('active', c.id === `${section}Section`);
            });

            // 触发滚动动画
            setTimeout(() => {
                document.querySelectorAll('.scroll-reveal').forEach(el => {
                    el.classList.add('revealed');
                });
            }, 100);
        }

        // ========== 搜索功能 ==========
        async function searchSkills() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                showToast('请输入搜索关键词', 'warning');
                return;
            }

            showLoading('searchResults', 6);
            document.getElementById('searchTag').textContent = `正在搜索: "${query}"`;

            try {
                const [res, aiRes] = await Promise.all([
                    fetch(`/api/search?q=${encodeURIComponent(query)}`),
                    fetch(`/api/search/ai?q=${encodeURIComponent(query)}`)
                ]);

                const data = await res.json();
                const aiData = await aiRes.json();

                document.getElementById('searchTag').textContent = `找到 ${data.count} 个本地 Skills`;
                showAIRecommendation(aiData.recommendation);
                renderSkills('searchResults', data.results);
                showSection('search');
            } catch (e) {
                showToast('搜索失败: ' + e.message, 'error');
                renderEmpty('searchResults', '搜索失败', '请检查网络连接后重试');
            }
        }

        async function searchAll() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                showToast('请输入搜索关键词', 'warning');
                return;
            }

            showLoading('searchResults', 4);
            showLoading('githubResults', 4);
            showToast('正在搜索本地和 GitHub...', 'info');

            try {
                const res = await fetch(`/api/search/all?q=${encodeURIComponent(query)}`);
                const data = await res.json();

                if (data.error) {
                    showToast(data.message || '搜索出错', 'error');
                    return;
                }

                showAIRecommendation(data.recommendation);

                const localCount = data.local?.count || 0;
                const githubCount = data.github?.count || 0;
                document.getElementById('searchTag').textContent =
                    `本地: ${localCount} 个 | GitHub: ${githubCount} 个仓库`;

                renderSkills('searchResults', data.local?.results || []);

                if (data.github?.repos?.length > 0) {
                    renderGithubResults(data.github.repos);
                    document.getElementById('githubTag').textContent =
                        `GitHub 上找到 ${githubCount} 个相关仓库`;
                    showSection('github');
                } else {
                    showSection('search');
                }
            } catch (e) {
                showToast('搜索失败: ' + e.message, 'error');
            }
        }

        // ========== AI 推荐 ==========
        function showAIRecommendation(rec) {
            const container = document.getElementById('aiRecommendation');
            if (!rec || !rec.recommendation) {
                container.innerHTML = '';
                return;
            }

            const suggestions = rec.suggestions?.map(s =>
                `<span class="ai-suggestion" onclick="searchSuggestion('${s}')">${s}</span>`
            ).join('') || '';

            container.innerHTML = `
                <div class="ai-card">
                    <div class="ai-header">
                        <div class="ai-avatar">🤖</div>
                        <div>
                            <div class="ai-label">AI 智能推荐</div>
                        </div>
                    </div>
                    <div class="ai-text">${rec.recommendation}</div>
                    ${suggestions ? `<div class="ai-suggestions">${suggestions}</div>` : ''}
                </div>
            `;
        }

        function searchSuggestion(keyword) {
            document.getElementById('searchInput').value = keyword;
            searchSkills();
        }

        // ========== 渲染技能卡片 ==========
        function renderSkills(containerId, skills) {
            const container = document.getElementById(containerId);

            if (!skills || skills.length === 0) {
                renderEmpty(containerId, '暂无数据', '尝试其他关键词搜索');
                return;
            }

            container.innerHTML = skills.map((skill, index) => `
                <div class="skill-card scroll-reveal" style="animation-delay: ${index * 0.05}s">
                    <div class="skill-card-header">
                        <div class="skill-emoji">${skill.category_emoji || '📦'}</div>
                        <div class="skill-info">
                            <div class="skill-name">
                                ${skill.name}
                            </div>
                            <span class="skill-category">
                                ${skill.category_name || ''}
                            </span>
                        </div>
                    </div>
                    <p class="skill-desc">${skill.description || '暂无描述'}</p>
                    <div class="skill-actions">
                        <button class="skill-action secondary" onclick="showSkillDetail('${skill.name}')">
                            查看详情
                        </button>
                        <button class="skill-action primary" onclick="addToCart('${skill.name}')">
                            + 加入清单
                        </button>
                    </div>
                </div>
            `).join('');

            // 触发滚动动画
            setTimeout(() => {
                container.querySelectorAll('.scroll-reveal').forEach(el => {
                    el.classList.add('revealed');
                });
            }, 100);
        }

        // ========== 渲染 GitHub 结果 ==========
        function renderGithubResults(repos) {
            const container = document.getElementById('githubResults');

            if (!repos || repos.length === 0) {
                renderEmpty('githubResults', '暂无数据', 'GitHub 上没有找到相关仓库');
                return;
            }

            container.innerHTML = repos.map((repo, index) => {
                const lang = repo.language || '';
                const langColor = langColors[lang] || '#8b949e';

                return `
                    <div class="github-card scroll-reveal" style="animation-delay: ${index * 0.05}s">
                        <div class="github-header">
                            <span class="github-owner">${repo.name.split('/')[0]}</span>
                            <span class="github-stars">⭐ ${formatStars(repo.stars)}</span>
                        </div>
                        <a href="${repo.url}" target="_blank" class="github-name">${repo.name.split('/')[1]}</a>
                        <p class="github-desc">${repo.description || '暂无描述'}</p>
                        <div class="github-meta">
                            ${lang ? `
                                <span class="github-lang">
                                    <span class="lang-dot" style="background: ${langColor}"></span>
                                    ${lang}
                                </span>
                            ` : ''}
                            ${repo.updated ? `<span>更新于 ${formatDate(repo.updated)}</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            setTimeout(() => {
                container.querySelectorAll('.scroll-reveal').forEach(el => {
                    el.classList.add('revealed');
                });
            }, 100);
        }

        // ========== 详情页 ==========
        async function showSkillDetail(name) {
            showLoading('skillDetail', 1);

            try {
                const res = await fetch(`/api/skill/${encodeURIComponent(name)}`);
                const skill = await res.json();

                const files = skill.files?.map(f => `
                    <li class="file-item">
                        <span class="file-name">📄 ${f.path}</span>
                        <span class="file-size">${formatSize(f.size)}</span>
                    </li>
                `).join('') || '<li class="file-item">暂无文件</li>';

                document.getElementById('skillDetail').innerHTML = `
                    <div class="detail-section">
                        <div class="detail-header">
                            <div class="detail-emoji">${skill.emoji}</div>
                            <div class="detail-info">
                                <h2>${skill.name}</h2>
                                <div class="detail-meta">
                                    <span>📂 ${skill.category}</span>
                                    <span>📁 ${skill.files?.length || 0} 个文件</span>
                                    <span>📍 ${skill.path}</span>
                                </div>
                            </div>
                        </div>
                        <p class="detail-desc">${skill.description || '暂无描述'}</p>
                        <div class="detail-files">
                            <h4>📁 文件结构</h4>
                            <ul class="file-list">
                                ${files}
                            </ul>
                        </div>
                        <div class="detail-actions">
                            <button class="btn btn-primary" onclick="addToCart('${skill.name}')">
                                + 加入清单
                            </button>
                            <button class="btn btn-secondary" onclick="packageSingle('${skill.name}')">
                                📦 单独打包
                            </button>
                        </div>
                    </div>
                `;
                showSection('detail');
            } catch (e) {
                showToast('加载失败: ' + e.message, 'error');
            }
        }

        // ========== 场景推荐 ==========
        async function loadScenarios() {
            const container = document.getElementById('scenariosList');
            const scenarios = [
                {key: "pm_basics", name: "产品经理基础", emoji: "📋", desc: "PRD、用户故事、需求分析", count: 5},
                {key: "pm_advanced", name: "高级产品经理", emoji: "🎯", desc: "战略、指标、商业化", count: 3},
                {key: "customer_discovery", name: "客户探索验证", emoji: "🔍", desc: "访谈准备、发现流程", count: 4},
                {key: "agile_dev", name: "敏捷开发团队", emoji: "🏃", desc: "Sprint规划、回顾", count: 4},
                {key: "scrum_team", name: "Scrum团队", emoji: "🎯", desc: "14个Scrum仪式", count: 5},
                {key: "qa_testing", name: "QA与测试", emoji: "🧪", desc: "E2E、Playwright", count: 4},
                {key: "architecture", name: "架构设计", emoji: "🏗️", desc: "DDD、API设计", count: 2},
                {key: "dev_quality", name: "开发质量", emoji: "💎", desc: "整洁代码、调试", count: 4},
                {key: "tdd_workflow", name: "TDD测试驱动", emoji: "⚡", desc: "红绿重构", count: 3},
                {key: "indie_hacker", name: "独立开发者", emoji: "💰", desc: "MVP、获客、增长", count: 5},
                {key: "ai_product", name: "AI产品开发", emoji: "🤖", desc: "Prompt、安全", count: 3},
                {key: "design_system", name: "设计系统", emoji: "🎨", desc: "UI/UX组件库", count: 2},
                {key: "skill_creation", name: "Skill开发", emoji: "🛠️", desc: "官方创建工具", count: 1}
            ];

            container.innerHTML = scenarios.map((s, index) => `
                <div class="scenario-card scroll-reveal" onclick="loadScenario('${s.key}')" style="animation-delay: ${index * 0.03}s">
                    <span class="scenario-count">${s.count} 个</span>
                    <span class="scenario-emoji">${s.emoji}</span>
                    <h3>${s.name}</h3>
                    <p>${s.desc}</p>
                </div>
            `).join('');

            setTimeout(() => {
                container.querySelectorAll('.scroll-reveal').forEach(el => {
                    el.classList.add('revealed');
                });
            }, 100);
        }

        async function loadScenario(key) {
            showLoading('scenariosList', 4);

            try {
                const res = await fetch(`/api/scenario/${key}`);
                const data = await res.json();

                document.getElementById('scenarioTag').textContent = `${data.name} - ${data.count} 个 Skills`;
                renderSkills('scenariosList', data.skills);
            } catch (e) {
                showToast('加载失败: ' + e.message, 'error');
            }
        }

        // ========== 分类浏览 ==========
        async function loadCategories() {
            const container = document.getElementById('categoriesList');

            try {
                const res = await fetch('/api/stats');
                const data = await res.json();

                const maxCount = Math.max(...data.categories.map(c => c.count), 1);

                container.innerHTML = data.categories.map((cat, index) => `
                    <div class="category-card scroll-reveal" onclick="loadCategory('${cat.key}')" style="animation-delay: ${index * 0.03}s">
                        <div class="category-header">
                            <div class="category-emoji">${cat.emoji}</div>
                            <div class="category-info">
                                <h3>${cat.name}</h3>
                                <span class="category-count">${cat.count} 个 Skills</span>
                            </div>
                        </div>
                        <div class="category-bar">
                            <div class="category-bar-fill" style="width: ${(cat.count / maxCount) * 100}%"></div>
                        </div>
                    </div>
                `).join('');

                setTimeout(() => {
                    container.querySelectorAll('.scroll-reveal').forEach(el => {
                        el.classList.add('revealed');
                    });
                }, 100);
            } catch (e) {
                showToast('加载失败: ' + e.message, 'error');
            }
        }

        async function loadCategory(key) {
            showLoading('categoriesList', 4);

            try {
                const res = await fetch(`/api/category/${key}`);
                const data = await res.json();
                renderSkills('categoriesList', data.skills);
                showSection('categories');
            } catch (e) {
                showToast('加载失败: ' + e.message, 'error');
            }
        }

        // ========== 打包清单 ==========
        function addToCart(name) {
            if (!cart.includes(name)) {
                cart.push(name);
                updateCart();
                showToast(`已加入清单: ${name}`, 'success');
            } else {
                showToast('已在清单中', 'info');
            }
        }

        function removeFromCart(name) {
            cart = cart.filter(n => n !== name);
            updateCart();
            renderCart();
            showToast(`已从清单移除: ${name}`, 'info');
        }

        function updateCart() {
            document.getElementById('cartCount').textContent = cart.length;
            document.getElementById('cartTag').textContent = `已选择 ${cart.length} 个 Skills`;
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function loadCart() {
            const stored = localStorage.getItem('cart');
            if (stored) {
                cart = JSON.parse(stored);
                updateCart();
            }
        }

        function clearCart() {
            if (cart.length === 0) return;
            cart = [];
            updateCart();
            renderCart();
            showToast('清单已清空', 'info');
        }

        function renderCart() {
            const container = document.getElementById('cartList');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                        <div class="cart-empty-icon">📦</div>
                        <h3>清单为空</h3>
                        <p>浏览 Skills 并添加感兴趣的到清单中</p>
                    </div>
                `;
                return;
            }

            let skills = [];
            cart.forEach(name => {
                allSkills[name] = allSkills[name] || {name, category_emoji: '📦', category_name: '', description: ''};
                skills.push(allSkills[name]);
            });

            container.innerHTML = skills.map(s => `
                <div class="skill-card">
                    <div class="skill-card-header">
                        <div class="skill-emoji">${s.category_emoji || '📦'}</div>
                        <div class="skill-info">
                            <div class="skill-name">${s.name}</div>
                            <span class="skill-category">${s.category_name || ''}</span>
                        </div>
                    </div>
                    <div class="skill-actions">
                        <button class="skill-action secondary" onclick="showSkillDetail('${s.name}')">查看详情</button>
                        <button class="skill-action" style="background: var(--error); color: white;" onclick="removeFromCart('${s.name}')">移除</button>
                    </div>
                </div>
            `).join('');
        }

        // ========== 打包功能 ==========
        async function packageSelected() {
            if (cart.length === 0) {
                showToast('请先选择要打包的 Skills', 'warning');
                return;
            }

            showToast('正在打包...', 'info');

            try {
                const res = await fetch('/api/package', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({skills: cart, type: 'custom'})
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = `/download/${data.filename}`;
                    showToast(`打包完成！${data.count} 个 Skills`, 'success');
                }
            } catch (e) {
                showToast('打包失败: ' + e.message, 'error');
            }
        }

        async function packageAll() {
            showToast('正在打包全部 Skills...', 'info');

            try {
                const res = await fetch('/api/package-all', {method: 'POST'});
                const data = await res.json();

                if (data.success) {
                    window.location.href = `/download/${data.filename}`;
                    showToast(`全部打包完成！${data.count} 个 Skills`, 'success');
                }
            } catch (e) {
                showToast('打包失败: ' + e.message, 'error');
            }
        }

        async function packageSingle(name) {
            showToast('正在打包...', 'info');

            try {
                const res = await fetch('/api/package', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({skills: [name], type: 'single'})
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = `/download/${data.filename}`;
                    showToast(`打包完成！`, 'success');
                }
            } catch (e) {
                showToast('打包失败: ' + e.message, 'error');
            }
        }

        // ========== 加载状态 ==========
        function showLoading(containerId, count = 3) {
            const container = document.getElementById(containerId);
            container.innerHTML = Array(count).fill(`
                <div class="skeleton-card">
                    <div class="skeleton-header">
                        <div class="skeleton skeleton-emoji"></div>
                        <div class="skeleton-info">
                            <div class="skeleton skeleton-title"></div>
                            <div class="skeleton skeleton-subtitle"></div>
                        </div>
                    </div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text"></div>
                </div>
            `).join('');
        }

        // ========== 空状态 ==========
        function renderEmpty(containerId, title, desc) {
            const container = document.getElementById(containerId);
            const icons = {
                'searchResults': '🔍',
                'githubResults': '🐙',
                'scenariosList': '🎯',
                'categoriesList': '📂',
                'cartList': '📦'
            };
            const icon = icons[containerId] || '📭';

            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">${icon}</div>
                    <h3 class="empty-title">${title}</h3>
                    <p class="empty-desc">${desc}</p>
                </div>
            `;
        }

        // ========== Toast 通知 ==========
        function showToast(message, type = 'info', title = null) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: '💡'
            };

            const defaultTitles = {
                success: '操作成功',
                error: '发生错误',
                warning: '请注意',
                info: '提示'
            };

            toast.innerHTML = `
                <span class="toast-icon">${icons[type]}</span>
                <div class="toast-content">
                    <div class="toast-title">${title || defaultTitles[type]}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <button class="toast-close" onclick="this.parentElement.remove()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6 6 18M6 6l12 12"/>
                    </svg>
                </button>
            `;

            container.appendChild(toast);

            // 自动移除
            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // ========== 工具函数 ==========
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function formatStars(stars) {
            if (stars >= 1000) {
                return (stars / 1000).toFixed(1) + 'k';
            }
            return stars;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            if (days === 0) return '今天';
            if (days === 1) return '昨天';
            if (days < 7) return `${days} 天前`;
            if (days < 30) return `${Math.floor(days / 7)} 周前`;
            if (days < 365) return `${Math.floor(days / 30)} 个月前`;
            return `${Math.floor(days / 365)} 年前`;
        }

        // ========== 启动 ==========
        init();
    </script>
</body>
</html>
